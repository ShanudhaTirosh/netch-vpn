name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release artifacts
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          tar -czf "netch-vpn-${tag}.tar.gz" \
            install.sh backup.sh lib assets scripts sub_templates panel-theme \
            README.md LICENSE CHANGELOG.md SECURITY.md CONTRIBUTING.md ARCHITECTURE.md
          sha256sum install.sh "netch-vpn-${tag}.tar.gz" > SHA256SUMS.txt
          echo "Artifacts:"; ls -lh netch-vpn-*.tar.gz SHA256SUMS.txt

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" install.sh "netch-vpn-${tag}.tar.gz" SHA256SUMS.txt --clobber
          else
            gh release create "$tag" \
              --title "Netch VPN ${tag}" \
              --generate-notes \
              install.sh "netch-vpn-${tag}.tar.gz" SHA256SUMS.txt
          fi
