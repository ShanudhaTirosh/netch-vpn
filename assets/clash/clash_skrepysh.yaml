# Netch VPN — Clash/Mihomo profile: "skrepysh-style" rule-provider routing.
# install.sh substitutes ${DOMAIN} and ${SUB_PATH}. Selectable via -clash 1.
# Fresh baseline (review before production) — rule-provider URLs are examples.
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver: [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]

proxy-providers:
  netch:
    type: http
    url: "https://${DOMAIN}/${SUB_PATH}?clash=meta"
    interval: 3600
    path: ./providers/netch.yaml
    health-check: { enable: true, url: https://www.gstatic.com/generate_204, interval: 300 }

proxy-groups:
  - { name: NETCH, type: select, use: [netch], proxies: [AUTO, DIRECT] }
  - { name: AUTO, type: url-test, use: [netch], url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50 }

rule-providers:
  ads:
    type: http
    behavior: domain
    format: text
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./rules/ads.txt
    interval: 86400
  proxy-list:
    type: http
    behavior: domain
    format: text
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt"
    path: ./rules/proxy.txt
    interval: 86400

rules:
  - GEOIP,private,DIRECT,no-resolve
  - RULE-SET,ads,REJECT
  - RULE-SET,proxy-list,NETCH
  - MATCH,NETCH
