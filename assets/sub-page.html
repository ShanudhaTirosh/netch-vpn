<!DOCTYPE html>
<!--
  Netch VPN — static subscription landing (glass).
  Served from /var/www/subpage at /<web_path>?name=CLIENT_NAME.
  install.sh substitutes ${DOMAIN} / ${SUB_PATH} / ${SUB_JSON_PATH} and replaces
  sub.legiz.ru with <domain>/<sub2singbox_path>. (Tokens kept for that wiring.)
  The native, data-rich page lives in the panel (sub_templates/netch-glass);
  this static page is the friendly /web_path entry point.
-->
<html lang="en" data-theme="netch">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Netch VPN · Subscription</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script>
<style>
  :root{
    --bg:#03061D; --bg2:#02051D; --accent:#289DB7; --slate:#2B2D38;
    --glass:rgba(20,26,54,.55); --glass2:rgba(12,17,40,.72);
    --bd:rgba(255,255,255,.08); --bda:rgba(40,157,183,.22);
    --hi:#F4F7FB; --mid:#C2CBDA; --dim:#8A93A8; --glow:rgba(40,157,183,.45);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{min-height:100vh;color:var(--hi);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
    background:radial-gradient(900px 600px at 12% -8%,rgba(40,157,183,.18),transparent 60%),
      radial-gradient(800px 700px at 110% 10%,rgba(72,123,215,.14),transparent 55%),
      linear-gradient(160deg,var(--bg),var(--bg2));background-attachment:fixed;
    padding:clamp(16px,4vw,40px) clamp(12px,4vw,24px) 64px}
  .wrap{max-width:680px;margin:0 auto}
  .card{background:var(--glass);border:1px solid var(--bd);border-radius:16px;
    backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
    box-shadow:0 8px 32px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.05);
    padding:clamp(16px,3vw,24px);margin-bottom:18px}
  header.brand{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .logo{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--bg),var(--slate));border:1px solid var(--bda);
    box-shadow:0 0 22px var(--glow);color:var(--accent);font-weight:900;font-size:24px;
    font-family:"Arial Black",Arial,sans-serif}
  .brand h1{font-size:clamp(18px,4vw,22px);margin:0} .brand p{margin:2px 0 0;color:var(--dim);font-size:13px}
  label{display:block;color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
  input{width:100%;padding:12px 14px;border-radius:12px;background:var(--glass2);color:var(--hi);
    border:1px solid var(--bd);font-size:15px}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 1px var(--glow)}
  .actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:16px}
  button,a.act{appearance:none;cursor:pointer;text-decoration:none;text-align:center;border-radius:12px;
    padding:12px 14px;font-size:14px;font-weight:600;color:var(--hi);background:var(--glass2);
    border:1px solid var(--bd);transition:all .18s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  button:hover,a.act:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--glow);transform:translateY(-1px)}
  button.primary{background:linear-gradient(150deg,rgba(40,157,183,.30),rgba(40,157,183,.14));
    border-color:var(--accent);box-shadow:0 0 18px var(--glow)}
  .uri{margin-top:14px;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--mid);
    word-break:break-all;background:rgba(255,255,255,.03);padding:10px 12px;border-radius:10px;border:1px solid var(--bd)}
  #qrbox{margin-top:18px;text-align:center}#qrbox>div{background:#fff;padding:12px;border-radius:12px;display:inline-block}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--glass2);
    border:1px solid var(--accent);color:var(--hi);padding:11px 18px;border-radius:12px;font-size:14px;opacity:0;
    pointer-events:none;transition:all .25s ease;box-shadow:0 0 20px var(--glow);z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{text-align:center;color:var(--dim);font-size:12px;margin-top:24px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <div class="logo" aria-hidden="true">N</div>
    <div><h1>Netch VPN</h1><p>Powered by Netch Solutions</p></div>
  </header>

  <section class="card">
    <label for="name">Subscription name</label>
    <input id="name" placeholder="your-client-name" autocomplete="off" spellcheck="false">
    <div class="actions">
      <button class="primary" id="copySub">⧉ Copy subscription</button>
      <a class="act" id="singbox" href="#">⤓ sing-box</a>
      <a class="act" id="clash" href="#">⤓ Clash</a>
      <button id="qrBtn">▦ QR</button>
    </div>
    <div class="uri" id="subUri">—</div>
    <div id="qrbox"></div>
  </section>

  <footer>Netch VPN · NovaNetchX</footer>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  // install.sh fills these in (sed). Defaults keep the page usable if opened raw.
  var DOMAIN   = "${DOMAIN}";
  var SUB_PATH = "${SUB_PATH}";
  var JSON_PATH= "${SUB_JSON_PATH}";
  var SUB2SB   = "sub.legiz.ru"; // -> <domain>/<sub2singbox_path>

  var qs = new URLSearchParams(location.search);
  var nameInput = document.getElementById("name");
  nameInput.value = qs.get("name") || "";

  function base(){ return "https://"+DOMAIN; }
  function subUrl(n){ return base()+"/"+SUB_PATH+"/"+encodeURIComponent(n); }
  function jsonUrl(n){ return base()+"/"+JSON_PATH+"/"+encodeURIComponent(n); }
  function clashUrl(n){ return "https://"+SUB2SB+"/sub?target=clash&url="+encodeURIComponent(subUrl(n)); }

  function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
    clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove("show")},1800);}
  function copy(txt){ if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(function(){toast("Copied")},fb);} else fb();
    function fb(){var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";
      document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("Copied")}catch(e){toast("Copy failed")}document.body.removeChild(ta);} }

  var qrInstance=null;
  function render(){
    var n=(nameInput.value||"").trim();
    var u = n ? subUrl(n) : "Enter a name above";
    document.getElementById("subUri").textContent=u;
    document.getElementById("singbox").href = n ? ("sing-box://import-remote-profile?url="+encodeURIComponent(jsonUrl(n))+"#Netch%20VPN") : "#";
    document.getElementById("clash").href   = n ? ("clash://install-config?url="+encodeURIComponent(clashUrl(n))+"&name=Netch%20VPN") : "#";
    var box=document.getElementById("qrbox"); box.innerHTML="";
    if(n && window.QRCode){ qrInstance=new QRCode(box,{text:subUrl(n),width:200,height:200,correctLevel:QRCode.CorrectLevel.M}); }
  }
  nameInput.addEventListener("input",render);
  document.getElementById("copySub").addEventListener("click",function(){var n=(nameInput.value||"").trim();if(n)copy(subUrl(n));else toast("Enter a name first");});
  document.getElementById("qrBtn").addEventListener("click",render);
  window.addEventListener("load",render);
})();
</script>
</body>
</html>
